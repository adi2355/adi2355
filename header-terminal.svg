<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 64" role="img" aria-labelledby="title">
  <title id="title">Terminal top bar</title>

  <defs>
    <linearGradient id="barFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d6d0c7"/>
      <stop offset="100%" stop-color="#cbc4ba"/>
    </linearGradient>

    <linearGradient id="bodyFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1620" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#0f1620" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- top title bar -->
  <rect
    x="16"
    y="10"
    width="1168"
    height="24"
    rx="12"
    fill="url(#barFill)"
    stroke="#b9b2a7"
    stroke-opacity="0.85"
  />

  <!-- window dots -->
  <circle cx="38" cy="22" r="4" fill="#f06a61"/>
  <circle cx="54" cy="22" r="4" fill="#e0b34b"/>
  <circle cx="70" cy="22" r="4" fill="#57be6a"/>

  <!-- centered title -->
  <text
    x="600"
    y="25.5"
    text-anchor="middle"
    font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
    font-size="12"
    letter-spacing="0.5"
    fill="#60584f"
  >
    Github_Profile.txt
  </text>

  <!-- very light seam under top bar -->
  <line
    x1="17"
    y1="34"
    x2="1183"
    y2="34"
    stroke="#bfb7ae"
    stroke-opacity="0.45"
  />

  <!-- subtle body transition only -->
  <rect x="17" y="34" width="1166" height="10" fill="url(#bodyFade)" />
</svg>
