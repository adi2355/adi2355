<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 82" role="img" aria-labelledby="title">
  <title id="title">Terminal top bar</title>

  <defs>
    <linearGradient id="bodyGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10352b" stop-opacity="0.70"/>
      <stop offset="20%" stop-color="#1b7a57" stop-opacity="0.35"/>
      <stop offset="55%" stop-color="#111822" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="fadeDown" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- top title bar -->
  <rect x="14" y="10" width="1172" height="32" rx="17" fill="#d7d2cb" stroke="#b8b1a8"/>

  <!-- window dots -->
  <circle cx="38" cy="26" r="5" fill="#ff5f56"/>
  <circle cx="60" cy="26" r="5" fill="#ffbd2e"/>
  <circle cx="82" cy="26" r="5" fill="#27c93f"/>

  <!-- centered title -->
  <text
    x="600"
    y="30"
    text-anchor="middle"
    font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
    font-size="14"
    letter-spacing="1.1"
    fill="#514b46"
  >
    Profile.ts
  </text>

  <!-- seam under top bar -->
  <line x1="15" y1="42" x2="1185" y2="42" stroke="#c5beb6" stroke-opacity="0.95"/>

  <!-- open body hint only -->
  <rect x="15" y="42" width="1168" height="14" fill="url(#bodyGlow)"/>
  <rect x="15" y="40" width="1168" height="22" fill="url(#fadeDown)"/>
</svg>
