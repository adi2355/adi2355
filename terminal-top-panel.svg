<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 160" role="img" aria-labelledby="title desc">
  <title id="title">Terminal intro panel</title>
  <desc id="desc">A refined terminal-style top panel with attached title bar and terminal identity text.</desc>

  <defs>
    <linearGradient id="barFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4cec5"/>
      <stop offset="100%" stop-color="#c8c1b7"/>
    </linearGradient>

    <linearGradient id="bodyFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111821"/>
      <stop offset="100%" stop-color="#0d131b"/>
    </linearGradient>

    <linearGradient id="topGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="bottomBlend" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d131b" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0d131b" stop-opacity="0"/>
    </linearGradient>

    <!-- top-rounded / flat-bottom outer shape perfectly flush to edges -->
    <path id="panelShape" d="
      M 16 0
      H 1184
      Q 1200 0 1200 16
      V 160
      H 0
      V 16
      Q 0 0 16 0
      Z
    " />
  </defs>

  <!-- unified outer body with flat bottom -->
  <use href="#panelShape" fill="url(#bodyFill)" stroke="#202833" stroke-opacity="0.9"/>

  <!-- title bar -->
  <rect
    x="0"
    y="0"
    width="1200"
    height="32"
    rx="16"
    fill="url(#barFill)"
    stroke="#b8b1a6"
    stroke-opacity="0.85"
  />

  <!-- flatten lower corners of title bar so it feels attached -->
  <rect
    x="0"
    y="16"
    width="1200"
    height="16"
    fill="url(#barFill)"
  />

  <!-- top inner highlight -->
  <rect
    x="1"
    y="1"
    width="1198"
    height="10"
    rx="15"
    fill="url(#topGlow)"
  />

  <!-- window dots (slightly larger and centered in new thicker bar) -->
  <circle cx="24" cy="16" r="5" fill="#f06a61"/>
  <circle cx="44" cy="16" r="5" fill="#ddb14c"/>
  <circle cx="64" cy="16" r="5" fill="#58bb69"/>

  <!-- centered title -->
  <text
    x="600"
    y="20.5"
    text-anchor="middle"
    font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
    font-size="13"
    letter-spacing="0.5"
    fill="#60584f"
  >
    Github_Profile.txt
  </text>

  <!-- seam under title bar -->
  <line
    x1="0"
    y1="32"
    x2="1200"
    y2="32"
    stroke="#bfb7ae"
    stroke-opacity="0.32"
  />

  <!-- terminal text -->
  <text
    x="42"
    y="96"
    font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
    font-size="26"
    letter-spacing="0"
    fill="#f3c57c"
  >
    &gt; Aditya Khetarpal
  </text>

  <text
    x="42"
    y="124"
    font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
    font-size="14"
    letter-spacing="0.2"
    fill="#94a0ac"
  >
    Software Engineer · Edge-to-Cloud Platforms
  </text>

  <!-- subtle fade so the bottom feels open into the scene below -->
  <rect x="0" y="144" width="1200" height="16" fill="url(#bottomBlend)" />
</svg>
