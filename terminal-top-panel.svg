<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 124" role="img" aria-labelledby="title desc">
  <title id="title">Terminal intro panel</title>
  <desc id="desc">A refined terminal-style top panel with attached title bar and terminal identity text.</desc>

  <defs>
    <linearGradient id="barFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4cec5"/>
      <stop offset="100%" stop-color="#c8c1b7"/>
    </linearGradient>

    <linearGradient id="bodyFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111821"/>
      <stop offset="100%" stop-color="#0d131b"/>
    </linearGradient>

    <linearGradient id="topGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="bottomBlend" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d131b" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0d131b" stop-opacity="0"/>
    </linearGradient>

    <!-- top-rounded / flat-bottom outer shape -->
    <path id="panelShape" d="
      M 30 10
      H 1170
      Q 1184 10 1184 24
      V 110
      H 16
      V 24
      Q 16 10 30 10
      Z
    " />
  </defs>

  <!-- unified outer body with flat bottom -->
  <use href="#panelShape" fill="url(#bodyFill)" stroke="#202833" stroke-opacity="0.9"/>

  <!-- title bar -->
  <rect
    x="16"
    y="10"
    width="1168"
    height="24"
    rx="14"
    fill="url(#barFill)"
    stroke="#b8b1a6"
    stroke-opacity="0.85"
  />

  <!-- flatten lower corners of title bar so it feels attached -->
  <rect
    x="16"
    y="22"
    width="1168"
    height="12"
    fill="url(#barFill)"
  />

  <!-- top inner highlight -->
  <rect
    x="17"
    y="11"
    width="1166"
    height="10"
    rx="13"
    fill="url(#topGlow)"
  />

  <!-- window dots -->
  <circle cx="38" cy="22" r="4" fill="#f06a61"/>
  <circle cx="54" cy="22" r="4" fill="#ddb14c"/>
  <circle cx="70" cy="22" r="4" fill="#58bb69"/>

  <!-- centered title -->
  <text
    x="600"
    y="25.5"
    text-anchor="middle"
    font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
    font-size="12"
    letter-spacing="0.5"
    fill="#60584f"
  >
    Github_Profile.txt
  </text>

  <!-- seam under title bar -->
  <line
    x1="17"
    y1="34"
    x2="1183"
    y2="34"
    stroke="#bfb7ae"
    stroke-opacity="0.32"
  />

  <!-- terminal text -->
  <text
    x="42"
    y="72"
    font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
    font-size="24"
    letter-spacing="0"
    fill="#f3c57c"
  >
    &gt; Aditya Khetarpal
  </text>

  <text
    x="42"
    y="92"
    font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
    font-size="13"
    letter-spacing="0.2"
    fill="#94a0ac"
  >
    Software Engineer · Edge-to-Cloud Platforms
  </text>

  <!-- subtle fade so the bottom feels open into the scene below -->
  <rect x="16" y="94" width="1168" height="16" fill="url(#bottomBlend)" />
</svg>
