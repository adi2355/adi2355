<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 44" role="img" aria-labelledby="title desc">
  <title id="title">Terminal footer</title>
  <desc id="desc">A restrained Apple Terminal-style footer showing the current file path and end-of-file marker.</desc>

  <defs>
    <linearGradient id="bodyFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111821"/>
      <stop offset="100%" stop-color="#0d131b"/>
    </linearGradient>

    <style>
      .seam {
        stroke: #202833;
        stroke-width: 1;
      }
      .path {
        fill: #94a0ac;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 14px;
        letter-spacing: 0.2px;
      }
      .eof {
        fill: #f3c57c;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 14px;
        letter-spacing: 0.3px;
      }
    </style>
  </defs>

  <!-- same terminal body language as top -->
  <rect width="1200" height="44" fill="url(#bodyFill)"/>

  <!-- subtle seam, matching the restrained line language -->
  <line x1="0" y1="0.5" x2="1200" y2="0.5" class="seam"/>

  <!-- left context -->
  <text x="32" y="27" class="path">~/github/adi2355/README.md</text>

  <!-- right close -->
  <text x="1168" y="27" text-anchor="end" class="eof">EOF</text>
</svg>
