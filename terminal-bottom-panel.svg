<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 44" role="img" aria-labelledby="title desc">
  <title id="title">Terminal footer</title>
  <desc id="desc">A minimal terminal footer showing repository path and end-of-file marker.</desc>

  <defs>
    <style>
      .bg { fill: #111821; }
      .seam { stroke: #1f2833; stroke-width: 1; }
      .divider { stroke: #242f3b; stroke-width: 1; }
      .dot { fill: #58bb69; }
      .text {
        fill: #96a3b3;
        font: 500 14px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        letter-spacing: 0.2px;
      }
      .text-strong {
        fill: #d7dee7;
        font: 600 14px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        letter-spacing: 0.2px;
      }
      .text-accent {
        fill: #c8a56a;
        font: 600 14px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        letter-spacing: 0.4px;
      }
    </style>
  </defs>


  <rect class="bg" width="1200" height="44"/>


  <line class="seam" x1="0" y1="0.5" x2="1200" y2="0.5"/>

  <circle class="dot" cx="24" cy="22" r="4"/>
  <text class="text-strong" x="40" y="27">adi2355</text>
  <text class="text" x="102" y="27">~/github/README.md</text>

  <line class="divider" x1="1088" y1="12" x2="1088" y2="32"/>
  <text class="text-accent" x="1168" y="27" text-anchor="end">EOF</text>
</svg>
